name: Deploy to Production

on:
  push:
    branches:
      - main

# 防止并发部署互相干扰
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH Deploy to Ubuntu Server
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          # 脚本执行超时 10 分钟
          command_timeout: 10m
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
            if npm config get prefix 2>/dev/null | grep -q "^/usr"; then
              mkdir -p "$HOME/.npm-global"
              npm config set prefix "$HOME/.npm-global"
            fi
            export PATH="$HOME/.npm-global/bin:$PATH"

            DEPLOY_DIR="/home/alog/alog"
            REPO_URL="https://github.com/2634213728/Alog.git"

            # 确保 GitHub 主机指纹已信任
            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              # 目录存在但不是 git 仓库（上次克隆中断），清理后重新克隆
              rm -rf "$DEPLOY_DIR"
              mkdir -p "$DEPLOY_DIR"
              git clone "$REPO_URL" "$DEPLOY_DIR"
            fi
            bash "$DEPLOY_DIR/deploy/update.sh"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::部署失败，请检查服务器日志：pm2 logs alog"
