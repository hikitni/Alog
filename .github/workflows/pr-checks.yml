name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  changelog-check:
    name: CHANGELOG 更新检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查 CHANGELOG.md 是否已更新
        run: |
          # 获取本 PR 修改的文件列表
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          echo "本次 PR 修改的文件："
          echo "$CHANGED_FILES"

          # 检查是否包含 CHANGELOG.md
          if echo "$CHANGED_FILES" | grep -q "^CHANGELOG.md$"; then
            echo "✅ CHANGELOG.md 已更新"
          else
            # 如果只修改了文档、CI 配置等，跳过检查
            NON_DOC_CHANGES=$(echo "$CHANGED_FILES" | grep -vE "^(docs/|\.github/|README|\.vscode/|\.gitignore)" || true)
            if [ -z "$NON_DOC_CHANGES" ]; then
              echo "ℹ️ 仅修改了文档/配置文件，跳过 CHANGELOG 检查"
            else
              echo "❌ 检测到代码变更，但 CHANGELOG.md 未更新！"
              echo ""
              echo "请在 CHANGELOG.md 顶部添加本次变更记录，格式："
              echo ""
              echo "## [x.y.z] - $(date +%Y-%m-%d)"
              echo ""
              echo "### 新增 / 修改 / 修复 / 性能优化"
              echo "- 变更描述"
              exit 1
            fi
          fi

  lint-check:
    name: ESLint 代码规范检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: 安装依赖
        run: cd website && npm ci

      - name: 运行 ESLint
        run: cd website && npm run lint

  build-check:
    name: 构建验证
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: 安装依赖
        run: cd website && npm ci

      - name: 构建
        run: cd website && npm run build
        env:
          DATABASE_URL: file:./dev.db
